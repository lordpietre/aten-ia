name: Release binary

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    defaults:
      run:
        working-directory: memvid-agent-core
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev clang libgomp1

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --verbose

      - name: Strip binary
        run: strip target/release/memvid-agent-core

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: memvid-agent-core-${{ matrix.target }}
          path: memvid-agent-core/target/release/memvid-agent-core
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package binaries
        run: |
          set -e
          cd artifacts
          for dir in memvid-agent-core-*/; do
            name="${dir%/}"
            cp "$dir/memvid-agent-core" .
            tar czf "${name}.tar.gz" memvid-agent-core
            sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256"
            rm -f memvid-agent-core
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          body: |
            ## memvid-agent-core ${{ github.ref_name }}

            ### Binaries
            - `memvid-agent-core-x86_64-unknown-linux-gnu.tar.gz` (Intel/AMD 64-bit)
            - `memvid-agent-core-aarch64-unknown-linux-gnu.tar.gz` (ARM 64-bit)
          files: artifacts/*.tar.gz*
