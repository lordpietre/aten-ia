name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: memvid-agent-core
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (x86_64)
        if: matrix.cross == false
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            cmake libssl-dev clang libclang-dev gcc

      - name: Install system dependencies (aarch64 cross)
        if: matrix.cross == true
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            cmake libssl-dev clang libclang-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            crossbuild-essential-arm64 \
            libgomp1-arm64-cross

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Rust tools (native only)
        if: matrix.cross == false
        run: rustup component add rustfmt clippy

      - name: Install cross target
        if: matrix.cross == true
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build llama.cpp static libs (native x86_64)
        if: matrix.cross == false
        run: |
          cmake -B build -S llama-cpp-turboquant \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_NATIVE=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Build llama.cpp static libs (cross aarch64)
        if: matrix.cross == true
        run: |
          cat > llama-cpp-turboquant/cross-toolchain.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} -march=armv8-a+dotprod")
          set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} -march=armv8-a+dotprod")
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF
          cmake -B build -S llama-cpp-turboquant \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/llama-cpp-turboquant/cross-toolchain.cmake" \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_CPU_ARM_ARCH=armv8-a+dotprod \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Package llama static libs
        run: |
          mkdir -p llama-libs
          find build -name "*.a" -exec cp {} llama-libs/ \;
          echo "==> Packaged static libs:"
          ls -lh llama-libs/

      - name: Build (native x86_64)
        if: matrix.cross == false
        env:
          LLAMA_LOCAL_LIBS: llama-libs
        run: cargo build --verbose

      - name: Build (cross aarch64)
        if: matrix.cross == true
        env:
          LLAMA_LOCAL_LIBS: llama-libs
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --verbose --target aarch64-unknown-linux-gnu

      - name: Test (native only)
        if: matrix.cross == false
        env:
          LLAMA_LOCAL_LIBS: llama-libs
        run: cargo test --verbose -- --test-threads=1

      - name: Check formatting
        if: matrix.cross == false
        run: cargo fmt --all -- --check

      - name: Clippy (native)
        if: matrix.cross == false
        env:
          LLAMA_LOCAL_LIBS: llama-libs
        run: cargo clippy --lib