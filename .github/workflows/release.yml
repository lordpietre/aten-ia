name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            deb_arch: arm64
    defaults:
      run:
        working-directory: memvid-agent-core
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev clang libgomp1 fakeroot

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build llama.cpp static libs
        run: |
          cmake -B build -S llama-cpp-turboquant \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Package llama static libs
        run: |
          mkdir -p libs
          find build -name "*.a" -exec cp {} libs/ \;
          tar -czf llama-libs-${{ matrix.target }}.tar.gz -C libs .
          ls -lh llama-libs-${{ matrix.target }}.tar.gz

      - name: Build release binary
        run: LLAMA_LOCAL_LIBS=libs cargo build --release --verbose

      - name: Strip binary
        run: strip target/release/aten-ia

      - name: Package binary tar.gz
        run: |
          cp target/release/aten-ia aten-ia
          tar czf aten-ia-${{ matrix.target }}.tar.gz aten-ia
          sha256sum aten-ia-${{ matrix.target }}.tar.gz > aten-ia-${{ matrix.target }}.tar.gz.sha256

      - name: Build .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_ROOT=debian/aten-ia_${VERSION}_${{ matrix.deb_arch }}
          mkdir -p "$PKG_ROOT/DEBIAN"
          mkdir -p "$PKG_ROOT/usr/bin"
          mkdir -p "$PKG_ROOT/usr/share/doc/aten-ia"

          cp target/release/aten-ia "$PKG_ROOT/usr/bin/"
          cp ../README.md "$PKG_ROOT/usr/share/doc/aten-ia/"
          cp ../AGENTS.md "$PKG_ROOT/usr/share/doc/aten-ia/"

          cat > "$PKG_ROOT/DEBIAN/control" <<EOF
          Package: aten-ia
          Version: ${VERSION}
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: lordpietre <lordpietre@users.noreply.github.com>
          Description: Local LLM agent with persistent memory and RAG
           Interactive AI agent CLI with local LLM inference via llama.cpp,
           persistent conversations (.mv2), keyword RAG, OpenAI-compatible API,
           and multi-source ingestion (PDF, EPUB, HTML, MD, TXT, URLs).
          Depends: libc6, libstdc++6, libgomp1
          EOF

          gzip -9 -n "$PKG_ROOT/usr/share/doc/aten-ia/README.md"
          gzip -9 -n "$PKG_ROOT/usr/share/doc/aten-ia/AGENTS.md"

          fakeroot dpkg-deb --build "$PKG_ROOT"
          mv "debian/aten-ia_${VERSION}_${{ matrix.deb_arch }}.deb" .
          sha256sum "aten-ia_${VERSION}_${{ matrix.deb_arch }}.deb" > "aten-ia_${VERSION}_${{ matrix.deb_arch }}.deb.sha256"

      - name: Build snap package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: \"${VERSION}\"/" ../snapcraft.yaml
          sudo snap install snapcraft --classic 2>/dev/null || sudo snap refresh snapcraft --classic
          cd ..
          sudo snapcraft --destructive-mode
          mv "aten-ia_${VERSION}_${{ matrix.deb_arch }}.snap" memvid-agent-core/
          cd memvid-agent-core
          sha256sum "aten-ia_${VERSION}_${{ matrix.deb_arch }}.snap" > "aten-ia_${VERSION}_${{ matrix.deb_arch }}.snap.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            llama-libs-${{ matrix.target }}.tar.gz
            aten-ia-${{ matrix.target }}.tar.gz
            aten-ia-${{ matrix.target }}.tar.gz.sha256
            aten-ia_*.deb
            aten-ia_*.deb.sha256
            aten-ia_*.snap
            aten-ia_*.snap.sha256
          fail_on_unmatched_files: false
