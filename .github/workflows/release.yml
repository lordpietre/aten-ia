name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    container:
      image: ubuntu:20.04
      env:
        DEBIAN_FRONTEND: noninteractive
        TZ: Etc/UTC
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            deb_arch: amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            deb_arch: arm64
            cross: true
    defaults:
      run:
        working-directory: memvid-agent-core
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (x86_64)
        if: matrix.cross == false
        run: |
          apt-get update -y
          apt-get install -y --no-install-recommends \
            build-essential \
            g++-9 \
            gcc-9 \
            cmake \
            libssl-dev \
            clang \
            libclang-dev \
            libgcc-9-dev \
            fakeroot \
            curl \
            git \
            pkg-config \
            ca-certificates
          # Verify gcc-9 static libs exist (needed for ATEN_PORTABLE)
          ls -la /usr/lib/gcc/x86_64-linux-gnu/9/libstdc++.a /usr/lib/gcc/x86_64-linux-gnu/9/libgomp.a

      - name: Install system dependencies (aarch64 cross)
        if: matrix.cross == true
        run: |
          apt-get update -y
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libssl-dev \
            clang \
            libclang-dev \
            fakeroot \
            curl \
            git \
            pkg-config \
            ca-certificates \
            gcc-aarch64-linux-gnu \
            g++-aarch64-linux-gnu \
            crossbuild-essential-arm64 \
            libstdc++-9-dev-arm64-cross \
            libgomp1-arm64-cross
          # Verify cross static libs
          ls -la /usr/lib/gcc-cross/aarch64-linux-gnu/9/libstdc++.a /usr/lib/gcc-cross/aarch64-linux-gnu/9/libgomp.a || \
            ls -la /usr/lib/aarch64-linux-gnu/libstdc++.a /usr/lib/aarch64-linux-gnu/libgomp.a || true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross target
        if: matrix.cross == true
        run: rustup target add ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build llama.cpp static libs (native x86_64)
        if: matrix.cross == false
        run: |
          cmake -B build -S llama-cpp-turboquant \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_NATIVE=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Build llama.cpp static libs (cross aarch64)
        if: matrix.cross == true
        run: |
          cat > llama-cpp-turboquant/cross-toolchain.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_ASM_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_C_FLAGS_INIT "-march=armv8.2-a")
          set(CMAKE_CXX_FLAGS_INIT "-march=armv8.2-a")
          set(CMAKE_ASM_FLAGS_INIT "-march=armv8.2-a")
          EOF
          cmake -B build -S llama-cpp-turboquant \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/llama-cpp-turboquant/cross-toolchain.cmake" \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_CPU_ARM_ARCH=armv8.2-a \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Package llama static libs
        run: |
          mkdir -p llama-libs
          find build -name "*.a" -exec cp {} llama-libs/ \;
          echo "==> Packaged static libs:"
          ls -lh llama-libs/

      - name: Build release binary
        env:
          ATEN_PORTABLE: "1"
          LLAMA_LOCAL_LIBS: llama-libs
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross == true && 'aarch64-linux-gnu-gcc' || '' }}
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Strip binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/aten-ia
          else
            strip target/${{ matrix.target }}/release/aten-ia
          fi

      - name: Validate binary compatibility (x86_64)
        if: matrix.cross == false
        run: |
          echo "==> Binary size:"
          ls -lh target/${{ matrix.target }}/release/aten-ia
          echo ""
          echo "==> Checking glibc version requirement..."
          MAX_GLIBC=$(objdump -T target/${{ matrix.target }}/release/aten-ia | grep -oP 'GLIBC_\K[0-9.]+' | sort -Vru | head -1)
          echo "Maximum glibc version required: GLIBC_$MAX_GLIBC"
          echo ""
          echo "==> Compatibility check:"
          PASS=true
          for VER in "2.31" "2.35" "2.39" "2.41"; do
            if printf '%s\n' "$MAX_GLIBC" "$VER" | sort -VC; then
              echo "  GLIBC_$MAX_GLIBC <= GLIBC_$VER: OK"
            else
              echo "  GLIBC_$MAX_GLIBC > GLIBC_$VER: FAIL (requires newer glibc)"
              PASS=false
            fi
          done
          echo ""
          echo "  Ubuntu 20.04 (glibc 2.31): $(printf '%s\n' "$MAX_GLIBC" "2.31" | sort -VC && echo 'OK' || echo 'FAIL')"
          echo "  Ubuntu 22.04 (glibc 2.35): $(printf '%s\n' "$MAX_GLIBC" "2.35" | sort -VC && echo 'OK' || echo 'FAIL')"
          echo "  Ubuntu 24.04 (glibc 2.39): $(printf '%s\n' "$MAX_GLIBC" "2.39" | sort -VC && echo 'OK' || echo 'FAIL')"
          echo "  Ubuntu 26.04 (glibc 2.41): $(printf '%s\n' "$MAX_GLIBC" "2.41" | sort -VC && echo 'OK' || echo 'FAIL')"
          echo "  Debian 12   (glibc 2.36): $(printf '%s\n' "$MAX_GLIBC" "2.36" | sort -VC && echo 'OK' || echo 'FAIL')"
          echo "  Debian 13   (glibc 2.38): $(printf '%s\n' "$MAX_GLIBC" "2.38" | sort -VC && echo 'OK' || echo 'FAIL')"
          echo ""
          if [ "$PASS" = false ]; then
            echo "::error::Binary not compatible with all target distros"
            exit 1
          fi
          echo "✓ Binary is compatible with Ubuntu 20.04+, 22.04+, 24.04+, 26.04+, Debian 12+, 13+"

      - name: Validate dynamic dependencies (x86_64)
        if: matrix.cross == false
        run: |
          echo "==> Dynamic library dependencies:"
          ldd target/${{ matrix.target }}/release/aten-ia || true
          echo ""
          echo "==> Verifying libstdc++ and libgomp are NOT dynamic..."
          if ldd target/${{ matrix.target }}/release/aten-ia 2>&1 | grep -qE 'libstdc\+\+|libgomp'; then
            echo "WARNING: libstdc++ or libgomp is dynamically linked! Binary may not be portable."
            echo "Dynamic libstdc++/libgomp found:"
            ldd target/${{ matrix.target }}/release/aten-ia 2>&1 | grep -E 'libstdc\+\+|libgomp'
            exit 1
          else
            echo "✓ libstdc++ and libgomp are statically linked"
          fi

      - name: Package binary tar.gz
        run: |
          cp target/${{ matrix.target }}/release/aten-ia aten-ia
          tar czf aten-ia-${{ matrix.target }}.tar.gz aten-ia
          sha256sum aten-ia-${{ matrix.target }}.tar.gz > aten-ia-${{ matrix.target }}.tar.gz.sha256

      - name: Build .deb package
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/' || echo "0.0.0")
          PKG_ROOT="debian/aten-ia_${VERSION}_${{ matrix.deb_arch }}"
          mkdir -p "$PKG_ROOT/DEBIAN"
          mkdir -p "$PKG_ROOT/usr/bin"
          mkdir -p "$PKG_ROOT/usr/share/doc/aten-ia"

          cp target/${{ matrix.target }}/release/aten-ia "$PKG_ROOT/usr/bin/"
          cp ../README.md "$PKG_ROOT/usr/share/doc/aten-ia/"
          cp ../AGENTS.md "$PKG_ROOT/usr/share/doc/aten-ia/"

          cat > "$PKG_ROOT/DEBIAN/control" <<EOF
          Package: aten-ia
          Version: ${VERSION}
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: lordpietre <lordpietre@users.noreply.github.com>
          Description: Local LLM agent with persistent memory and RAG
           Interactive AI agent CLI with local LLM inference via llama.cpp,
           persistent conversations (.mv2), keyword RAG, OpenAI-compatible API,
           and multi-source ingestion (PDF, EPUB, HTML, MD, TXT, URLs).
          Depends: libc6 (>= 2.31)
          EOF

          gzip -9 -n "$PKG_ROOT/usr/share/doc/aten-ia/README.md"
          gzip -9 -n "$PKG_ROOT/usr/share/doc/aten-ia/AGENTS.md"

          fakeroot dpkg-deb --build "$PKG_ROOT"
          mv "debian/aten-ia_${VERSION}_${{ matrix.deb_arch }}.deb" .
          sha256sum "aten-ia_${VERSION}_${{ matrix.deb_arch }}.deb" > "aten-ia_${VERSION}_${{ matrix.deb_arch }}.deb.sha256"

      - name: Upload build artifacts (non-tag)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: aten-ia-${{ matrix.target }}-${{ github.sha }}
          path: |
            memvid-agent-core/aten-ia-${{ matrix.target }}.tar.gz
            memvid-agent-core/aten-ia-${{ matrix.target }}.tar.gz.sha256
            memvid-agent-core/aten-ia_*.deb
            memvid-agent-core/aten-ia_*.deb.sha256
          if-no-files-found: warn

      - name: Upload release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            memvid-agent-core/aten-ia-${{ matrix.target }}.tar.gz
            memvid-agent-core/aten-ia-${{ matrix.target }}.tar.gz.sha256
            memvid-agent-core/aten-ia_*.deb
            memvid-agent-core/aten-ia_*.deb.sha256
          fail_on_unmatched_files: false