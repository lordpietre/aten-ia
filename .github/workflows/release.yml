name: Release prebuilt llama libs

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-libs:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev clang libgomp1

      - name: Build llama.cpp static libs
        run: |
          cmake -B build -S memvid-agent-core/llama-cpp-turboquant \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Package static libs
        run: |
          mkdir -p libs
          find build -name "*.a" -exec cp {} libs/ \;
          ls -la libs/
          tar -czf llama-libs-${{ matrix.target }}.tar.gz -C libs .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: llama-libs-${{ matrix.target }}.tar.gz
          fail_on_unmatched_files: false
