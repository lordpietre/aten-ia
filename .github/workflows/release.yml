name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: 2

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            deb_arch: amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            deb_arch: arm64
            cross: true
    defaults:
      run:
        working-directory: memvid-agent-core
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (x86_64)
        if: matrix.cross == false
        run: sudo apt-get update && sudo apt-get install -y cmake libssl-dev clang libgomp-dev fakeroot

      - name: Install system dependencies (aarch64 cross)
        if: matrix.cross == true
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev clang fakeroot gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libgomp-dev:aarch64
          sudo sed -i 's/^# deb/deb/' /etc/apt/sources.list /etc/apt/sources.list.d/*.list 2>/dev/null || true
          sudo dpkg --add-architecture arm64
          sudo apt-get update
          sudo apt-get install -y libgomp-dev:aarch64 libstdc++-dev-arm64-cross

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build llama.cpp static libs (native x86_64)
        if: matrix.cross == false
        run: |
          cmake -B build -S llama-cpp-turboquant \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_NATIVE=OFF \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Build llama.cpp static libs (cross aarch64)
        if: matrix.cross == true
        run: |
          cat > cross-toolchain.cmake <<'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR arm64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          EOF
          cmake -B build -S llama-cpp-turboquant \
            -DCMAKE_TOOLCHAIN_FILE=cross-toolchain.cmake \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DGGML_NATIVE=OFF \
            -DGGML_CPU_ARM_ARCH=armv8-a+dotprod \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)

      - name: Package llama static libs
        run: |
          mkdir -p libs
          find build -name "*.a" -exec cp {} libs/ \;
          tar -czf llama-libs-${{ matrix.target }}.tar.gz -C libs .
          ls -lh llama-libs-${{ matrix.target }}.tar.gz

      - name: Build release binary (native x86_64)
        if: matrix.cross == false
        run: LLAMA_LOCAL_LIBS=libs cargo build --release --target ${{ matrix.target }} --verbose

      - name: Build release binary (cross aarch64)
        if: matrix.cross == true
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: LLAMA_LOCAL_LIBS=libs cargo build --release --target ${{ matrix.target }} --verbose

      - name: Strip binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/aten-ia
          else
            strip target/${{ matrix.target }}/release/aten-ia
          fi

      - name: Package binary tar.gz
        run: |
          cp target/${{ matrix.target }}/release/aten-ia aten-ia
          tar czf aten-ia-${{ matrix.target }}.tar.gz aten-ia
          sha256sum aten-ia-${{ matrix.target }}.tar.gz > aten-ia-${{ matrix.target }}.tar.gz.sha256

      - name: Build .deb package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          PKG_ROOT=debian/aten-ia_${VERSION}_${{ matrix.deb_arch }}
          mkdir -p "$PKG_ROOT/DEBIAN"
          mkdir -p "$PKG_ROOT/usr/bin"
          mkdir -p "$PKG_ROOT/usr/share/doc/aten-ia"

          cp target/${{ matrix.target }}/release/aten-ia "$PKG_ROOT/usr/bin/"
          cp ../README.md "$PKG_ROOT/usr/share/doc/aten-ia/"
          cp ../AGENTS.md "$PKG_ROOT/usr/share/doc/aten-ia/"

          cat > "$PKG_ROOT/DEBIAN/control" <<'DSC'
          Package: aten-ia
          Version: VERSION_PLACEHOLDER
          Architecture: ARCH_PLACEHOLDER
          Maintainer: lordpietre <lordpietre@users.noreply.github.com>
          Description: Local LLM agent with persistent memory and RAG
           Interactive AI agent CLI with local LLM inference via llama.cpp,
           persistent conversations (.mv2), keyword RAG, OpenAI-compatible API,
           and multi-source ingestion (PDF, EPUB, HTML, MD, TXT, URLs).
          Depends: libc6, libstdc++6, libgomp1
          DSC
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" "$PKG_ROOT/DEBIAN/control"
          sed -i "s/ARCH_PLACEHOLDER/${{ matrix.deb_arch }}/" "$PKG_ROOT/DEBIAN/control"

          gzip -9 -n "$PKG_ROOT/usr/share/doc/aten-ia/README.md"
          gzip -9 -n "$PKG_ROOT/usr/share/doc/aten-ia/AGENTS.md"

          fakeroot dpkg-deb --build "$PKG_ROOT"
          mv "debian/aten-ia_${VERSION}_${{ matrix.deb_arch }}.deb" .
          sha256sum "aten-ia_${VERSION}_${{ matrix.deb_arch }}.deb" > "aten-ia_${VERSION}_${{ matrix.deb_arch }}.deb.sha256"

      - name: Build snap package (x86_64 only)
        if: matrix.cross == false
        continue-on-error: true
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: \"${VERSION}\"/" ../snapcraft.yaml
          sudo snap install snapcraft --classic 2>/dev/null || sudo snap refresh snapcraft --classic
          cd ..
          sudo snapcraft --destructive-mode
          mv "aten-ia_${VERSION}_${{ matrix.deb_arch }}.snap" memvid-agent-core/
          cd memvid-agent-core
          sha256sum "aten-ia_${VERSION}_${{ matrix.deb_arch }}.snap" > "aten-ia_${VERSION}_${{ matrix.deb_arch }}.snap.sha256"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            memvid-agent-core/llama-libs-${{ matrix.target }}.tar.gz
            memvid-agent-core/aten-ia-${{ matrix.target }}.tar.gz
            memvid-agent-core/aten-ia-${{ matrix.target }}.tar.gz.sha256
            memvid-agent-core/aten-ia_*.deb
            memvid-agent-core/aten-ia_*.deb.sha256
            memvid-agent-core/aten-ia_*.snap
            memvid-agent-core/aten-ia_*.snap.sha256
          fail_on_unmatched_files: false