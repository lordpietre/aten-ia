[target.x86_64-unknown-linux-gnu]
rustflags = [
  "-C", "link-arg=-Wl,-Bstatic",
  "-C", "link-arg=-lstdc++",
  "-C", "link-arg=-lgomp",
  "-C", "link-arg=-Wl,-Bdynamic",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
  "-C", "link-arg=-Wl,-Bstatic",
  "-C", "link-arg=-lstdc++",
  "-C", "link-arg=-lgomp",
  "-C", "link-arg=-Wl,-Bdynamic",
]
